services:
  - type: web
    name: tc-domain-api
    env: python
    region: oregon
    plan: starter
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
         - key: TC_API_KEY
           sync: false
    healthCheckPath: /status
